<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Order — SportVest Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="shell">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu"><i class="ti ti-menu-2"></i></button>
      <div>
        <div class="topbar-title">Order detail</div>
        <div class="topbar-sub" id="topbar-sub">Loading…</div>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-ghost" href="sold-products.html"><i class="ti ti-arrow-left"></i> Back</a>
      </div>
    </div>

    <div class="content">

      <div id="loading-state">
        <div class="empty-state" style="padding:4rem 1rem;">
          <i class="ti ti-loader-2" style="animation:spin 0.7s linear infinite"></i>
          <p>Loading order…</p>
        </div>
      </div>

      <div id="detail-layout" style="display:none; gap:1.25rem; max-width:900px;">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; align-items:start;" id="detail-grid-row">

          <div class="form-card" style="padding:1.25rem;">
            <div class="detail-section" style="border:none;padding:0;margin-bottom:0.9rem;">Customer</div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;">
              <div class="avatar" id="customer-avatar" style="width:42px;height:42px;font-size:14px;flex-shrink:0;">?</div>
              <div>
                <div style="font-size:14px;font-weight:500;" id="customer-name">—</div>
                <div style="font-size:12px;color:var(--text-2);" id="customer-email">—</div>
              </div>
            </div>
            <div>
              <div class="detail-field-label">Address</div>
              <div class="detail-field-value" id="customer-address">—</div>
            </div>
            <div style="margin-top:10px;">
              <div class="detail-field-label">Date sold</div>
              <div class="detail-field-value" id="date-sold">—</div>
            </div>
          </div>

          <div class="form-card" style="padding:1.25rem;">
            <div class="detail-section" style="border:none;padding:0;margin-bottom:0.9rem;">Product</div>
            <div class="detail-grid">
              <div><div class="detail-field-label">Name</div><div class="detail-field-value" id="product-name">—</div></div>
              <div><div class="detail-field-label">Product code</div><div class="detail-field-value td-mono" id="product-code">—</div></div>
              <div><div class="detail-field-label">Category</div><div class="detail-field-value" id="product-category">—</div></div>
              <div><div class="detail-field-label">Price</div><div class="detail-field-value" id="product-price">—</div></div>
            </div>
            <div style="margin-top:10px;">
              <div class="detail-field-label">Description</div>
              <div class="detail-field-value text-muted" id="product-description" style="margin-top:3px;line-height:1.6;">—</div>
            </div>
          </div>

        </div>

        <div class="form-card" id="image-card" style="display:none;padding:1.25rem;margin-top:0;">
          <div class="detail-section" style="border:none;padding:0;margin-bottom:0.9rem;">Image</div>
          <div class="sold-img-preview" id="product-image-wrap"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/services/config.js"></script>
<script src="../js/services/serverBase.js"></script>
<script src="../js/services/product.js"></script>
<script src="../js/ui.js"></script>

<script>
  (async () => {
    const authed = await ServerBase.requireAuth();
    if (!authed) return;
    const id = UI.getParam('id');
    if (!id) { UI.toast('No order ID provided', 'error'); setTimeout(() => window.location.replace('sold-products.html'), 1500); return; }
    UI.renderSidebar();
    await loadOrder(id);
  })();

  async function loadOrder(id) {
    try {
      const resp = await Product.getSoldProductById(id);
      if (!resp || !resp.meta.success || !resp.data) {
        UI.toast('Order not found', 'error');
        setTimeout(() => window.location.replace('sold-products.html'), 1500);
        return;
      }
      const sale = resp.data;
      document.getElementById('topbar-sub').textContent       = `${UI.formatDate(sale.dateSold)} — ${sale.customerName || 'Unknown'}`;
      document.getElementById('customer-avatar').textContent  = UI.initials(sale.customerName || '?');
      document.getElementById('customer-name').textContent    = sale.customerName  || '—';
      document.getElementById('customer-email').textContent   = sale.customerEmail || '—';
      document.getElementById('customer-address').textContent = sale.customerAddress || '—';
      document.getElementById('date-sold').textContent        = UI.formatDate(sale.dateSold);
      document.getElementById('product-name').textContent     = sale.name     || '—';
      document.getElementById('product-code').textContent     = sale.prodCode || '—';
      document.getElementById('product-price').textContent    = `$${parseFloat(sale.price || 0).toFixed(2)}`;
      document.getElementById('product-category').innerHTML   = sale.category ? `<span class="badge b-purple">${sale.category}</span>` : '—';

      let description = '—';
      try { const info = JSON.parse(sale.info || '{}'); description = info.description || '—'; } catch {}
      document.getElementById('product-description').textContent = description;

      try {
        const photos = typeof sale.photos === 'string' ? JSON.parse(sale.photos) : (sale.photos || []);
        if (photos.length > 0) {
          const img = document.createElement('img');
          img.src = photos[0]; img.alt = sale.name || 'Product image';
          document.getElementById('product-image-wrap').appendChild(img);
          document.getElementById('image-card').style.display = 'block';
        }
      } catch {}

      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('detail-layout').style.display = 'grid';
    } catch (err) {
      console.error(err);
      UI.toast('A network error occurred', 'error');
    }
  }
</script>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
